name: CI

on:
  push:
    branches:
      - "main"
  pull_request:

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0
      - name: Sync environment
        run: uv sync
      - name: Ansible Lint
        run: uv run ansible-lint -s --exclude ./.github/ --exclude ./.github/workflows/
