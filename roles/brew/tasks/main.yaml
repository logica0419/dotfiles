---
- name: Install Homebrew
  install_brew:

- name: Update Homebrew
  community.general.homebrew:
    update_homebrew: true

- name: Install Homebrew packages
  block:
    - name: Register Homebrew tap
      community.general.homebrew_tap:
        name:
          - ycd/tap
          - k1LoW/tap
          - hashicorp/tap
          - terraform-linters/tap
          - oven-sh/bun
          - tinygo-org/tools
          - terror/tap
    - name: Install Homebrew packages
      community.general.homebrew:
        name:
          - rustup
          - uv
          - cmake
          - ninja
          - llvm
          - tinygo
          - git
          - gh
          - htop
          - jq
          - yq
          - shfmt
          - hashicorp/tap/terraform
          - terraform-linters/tap/tflint
          - direnv
          - dstp
          - tbls
          - hadolint
          - go-task
          - just
          - just-lsp
          - mise
          - oven-sh/bun/bun
          - oxlint
          - oxfmt
          - stylelint
          - easyeda2kicad
        state: present
