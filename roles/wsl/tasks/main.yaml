---
- name: SSH settings
  block:
    - name: Create .ssh directory
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/.ssh"
        state: directory
        mode: "0755"
    - name: Move SSH config
      ansible.builtin.copy:
        src: ssh_config
        dest: "{{ ansible_facts.user_dir }}/.ssh/config"
        mode: "0644"

- name: Enable systemd
  block:
    - name: Put WSL config
      become: true
      ansible.builtin.copy:
        src: wsl.conf
        dest: /etc/wsl.conf
        mode: "0644"
      register: wsl_conf
    - name: Stop ansible playbook
      ansible.builtin.fail:
        msg: Please restart WSL and run playbook again
      when: wsl_conf is changed # noqa: no-handler

# https://github.com/puppeteer/puppeteer/blob/main/docs/troubleshooting.md#running-puppeteer-on-wsl-windows-subsystem-for-linux
- name: Install Chromium-related packages
  become: true
  ansible.builtin.apt:
    name:
      - libgtk-3-dev
      - libnotify-dev
      - libgconf-2-4
      - libnss3
      - libxss1
      - libasound2
    state: present

- name: Add Chrome file to /usr/bin
  become: true
  ansible.builtin.copy:
    src: chrome
    dest: /usr/bin/chrome
    mode: "0755"

- name: Font settings
  become: true
  block:
    - name: Install packages
      ansible.builtin.apt:
        name:
          - fontconfig
        state: present
    - name: Copy font setting
      ansible.builtin.copy:
        src: local.conf
        dest: /etc/fonts/local.conf
        mode: "0644"
    - name: Enable font setting
      ansible.builtin.command: fc-cache -fv
      changed_when: false

- name: Setup VS Code server settings
  block:
    - name: Create VS Code server directories
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - .vscode-server
        - .vscode-server/data
        - .vscode-server/data/Machine
    - name: Put VS Code settings
      ansible.builtin.template:
        src: settings.json.j2
        dest: "{{ ansible_facts.user_dir }}/.vscode-server/data/Machine/settings.json"
        mode: "0644"

- name: Get current paths
  block:
    - name: Get current dir path
      ansible.builtin.command: pwd
      register: wsl_dotfiles_dir
      changed_when: false
    - name: Get ansible path
      ansible.builtin.command: which ansible-playbook
      register: wsl_ansible_path
      changed_when: false

- name: Setup updater service
  become: true
  block:
    - name: Copy updater service template
      ansible.builtin.template:
        src: updater.service.j2
        dest: /etc/systemd/system/updater.service
        mode: "0644"
    - name: Enable updater service
      ansible.builtin.systemd_service:
        name: updater.service
        enabled: true
        daemon_reload: true
        state: restarted
