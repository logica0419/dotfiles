---
- name: Update Homebrew-related components
  block:
    - name: Update Homebrew & Homebrew packages
      community.general.homebrew:
        update_homebrew: true
        upgrade_all: true
    - name: Cleanup
      ansible.builtin.shell: |
        {{ brew_base_path }}/bin/brew autoremove
        {{ brew_base_path }}/bin/brew cleanup
      changed_when: false

- name: Update Go packages
  ansible.builtin.shell: |
    export PATH=$PATH:/usr/local/go/bin
    /home/{{ ansible_user }}/go/bin/gup update
  changed_when: false

- name: Update Rust
  ansible.builtin.command: "{{ brew_base_path }}/bin/rustup update"
  changed_when: false

- name: Update Krew packages
  ansible.builtin.command: "{{ brew_base_path }}/bin/kubectl-krew upgrade"
  changed_when: false

- name: Update Python packages
  ansible.builtin.command: "{{ brew_base_path }}/bin/uv tool upgrade --all"
  changed_when: false

- name: Update mise packages
  ansible.builtin.command: "{{ brew_base_path }}/bin/mise upgrade --bump"
  changed_when: false

- name: Prune Docker components
  ansible.builtin.shell: |
    docker image prune -a -f
    docker volume prune -a -f
    docker network prune -f
  changed_when: false
