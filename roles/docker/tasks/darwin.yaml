---
- name: Install containerization packages
  block:
    - name: Register Homebrew tap
      community.general.homebrew_tap:
        name:
          - socktainer/tap
    - name: Trust socktainer tap
      ansible.builtin.command: brew trust socktainer/tap
      changed_when: false
    - name: Install Homebrew packages
      community.general.homebrew:
        name:
          - colima # for buildx support
          - container
          - socktainer

- name: Deploy Colima
  block:
    - name: Create Colima directories
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - ".colima"
        - ".colima/default"
    - name: Deploy Colima config file
      ansible.builtin.copy:
        src: colima.yaml
        dest: "{{ ansible_facts.user_dir }}/.colima/default/colima.yaml"
        mode: "0644"
    - name: Enable Colima service
      community.general.homebrew_services:
        name: colima
        state: present

- name: Configure container launch daemon
  become: true
  block:
    - name: Create root LaunchDaemons directory
      ansible.builtin.file:
        path: /Library/LaunchDaemons
        state: directory
        mode: "0755"
    - name: Deploy container launchd plist
      ansible.builtin.copy:
        src: container.plist
        dest: /Library/LaunchDaemons/homebrew.mxcl.container.plist
        mode: "0644"
      register: docker_container_plist
    - name: Enable container launch agent
      community.general.launchd:
        name: homebrew.mxcl.container
        enabled: true
        state: reloaded

- name: Configure socktainer launch agent
  block:
    - name: Create user LaunchAgents directory
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/Library/LaunchAgents"
        state: directory
        mode: "0755"
    - name: Deploy socktainer launchd plist
      ansible.builtin.copy:
        src: socktainer.plist
        dest: "{{ ansible_facts.user_dir }}/Library/LaunchAgents/homebrew.mxcl.socktainer.plist"
        mode: "0644"
      register: docker_socktainer_plist
    - name: Enable socktainer launch agent
      community.general.launchd:
        name: homebrew.mxcl.socktainer
        enabled: true
        state: reloaded

- name: Create socktainer context
  block:
    - name: Check socktainer Docker context
      ansible.builtin.command: docker context inspect socktainer
      register: docker_socktainer_context
      failed_when: false
      changed_when: false
    - name: Create socktainer Docker context
      ansible.builtin.command: docker context create --docker host=unix://{{ ansible_facts.user_dir }}/.socktainer/container.sock socktainer
      when: docker_socktainer_context.rc != 0
      changed_when: true
