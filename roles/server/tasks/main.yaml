---
- name: Power tuning
  become: true
  block:
    - name: Install power tuning tools
      ansible.builtin.apt:
        name:
          - powertop
          - "linux-tools-{{ ansible_facts['kernel'] }}"
          - r8125-dkms
        state: present
    - name: Copy powertop service
      ansible.builtin.copy:
        src: powertop.service
        dest: /etc/systemd/system/powertop.service
        mode: "0644"
    - name: Enable and run powertop service
      ansible.builtin.systemd_service:
        name: powertop.service
        enabled: true
        state: started
        daemon_reload: true
    - name: Set cpu freq governor
      ansible.builtin.command: cpupower frequency-set -g powersave
      changed_when: false
    - name: Configure r8125 driver
      ansible.builtin.copy:
        content: "options r8125 aspm=1 eee_enable=1\n"
        dest: /etc/modprobe.d/r8125.conf
        mode: "0644"
    - name: Put r8169 into blacklist
      ansible.builtin.copy:
        content: "blacklist r8169\n"
        dest: /etc/modprobe.d/blacklist-r8169.conf
        mode: "0644"
    - name: Update initramfs
      ansible.builtin.command: update-initramfs -u
      changed_when: false

- name: Set timezone to Asia/Tokyo
  become: true
  community.general.timezone:
    name: Asia/Tokyo

- name: Copy SSH keys to root home
  become: true
  ansible.builtin.copy:
    src: "{{ ansible_user_dir }}/.ssh/"
    dest: /root/.ssh/
    mode: "0755"
    owner: root
    group: root
    remote_src: true

- name: Setup Tailscale
  become: true
  block:
    - name: Get Tailscale install script
      ansible.builtin.get_url:
        url: https://tailscale.com/install.sh
        dest: /tmp/install.sh
        mode: "0755"
    - name: Install Tailscale
      ansible.builtin.command: /tmp/install.sh
      args:
        creates: /usr/bin/tailscale
      changed_when: false
    - name: Enable auto update
      ansible.builtin.command: tailscale set --auto-update
      changed_when: false
    - name: Enable IP v4/v6 forwarding
      ansible.posix.sysctl:
        name: "{{ item }}"
        value: "1"
        state: present
        reload: true
      loop:
        - net.ipv4.ip_forward
        - net.ipv6.conf.all.forwarding
    - name: Advertise exit node
      ansible.builtin.command: tailscale set --advertise-exit-node
      changed_when: false

- name: Setup VS Code server
  block:
    - name: Install
      become: true
      block:
        - name: Add gpg key
          ansible.builtin.get_url:
            url: https://packages.microsoft.com/keys/microsoft.asc
            dest: /etc/apt/keyrings/microsoft.asc
            mode: "0644"
            force: true
          register: server_ms_gpg_key
        - name: Copy repository ref
          ansible.builtin.copy:
            src: vscode.sources
            dest: /etc/apt/sources.list.d/vscode.sources
            mode: "0644"
          register: server_vscode_repo
        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true
          when: server_ms_gpg_key is changed or server_vscode_repo is changed
        - name: Install code
          ansible.builtin.apt:
            name: code
            state: present
    - name: Setup server
      block:
        - name: Enable linger state
          ansible.builtin.command: loginctl enable-linger {{ ansible_user }}
          changed_when: false
        - name: Create config directories
          ansible.builtin.file:
            path: "{{ ansible_user_dir }}/{{ item }}"
            state: directory
            mode: "0700"
          loop:
            - .config
            - .config/systemd
            - .config/systemd/user
            - .config/systemd/user/code-tunnel.service.d
        - name: Configure code tunnel service PATH override
          ansible.builtin.template:
            src: override.conf.j2
            dest: "{{ ansible_user_dir }}/.config/systemd/user/code-tunnel.service.d/override.conf"
            mode: "0600"
        - name: Create VS Code directories
          ansible.builtin.file:
            path: "{{ ansible_user_dir }}/{{ item }}"
            state: directory
            mode: "0755"
          loop:
            - .vscode-server
            - .vscode-server/data
            - .vscode-server/data/Machine
        - name: Copy VS Code settings
          ansible.builtin.template:
            src: settings.json.j2
            dest: "{{ ansible_user_dir }}/.vscode-server/data/Machine/settings.json"
            mode: "0644"

- name: Setup updater
  block:
    - name: Get current dir path
      ansible.builtin.command: pwd
      register: server_dotfiles_dir
      changed_when: false
    - name: Get ansible-playbook path
      ansible.builtin.command: which ansible-playbook
      register: server_ansible_playbook_path
      changed_when: false
    - name: Setup updater for server
      ansible.builtin.cron:
        name: update packages
        minute: 0
        hour: 4
        user: "{{ ansible_user }}"
        job: >-
          {{ server_ansible_playbook_path.stdout }} -v -u {{ ansible_user }}
          -i {{ server_dotfiles_dir.stdout }}/inventory {{ server_dotfiles_dir.stdout }}/update-linux.yaml

- name: Setup reboot
  become: true
  block:
    - name: Get reboot path
      ansible.builtin.command: which reboot
      register: server_reboot_path
      changed_when: false
    - name: Setup periodical reboot (update detection)
      ansible.builtin.cron:
        name: reboot server (update detection)
        minute: 30
        hour: 4
        user: root
        job: "[ -e /var/run/reboot-required ] && {{ server_reboot_path.stdout }} 0"

- name: Disable sleep mode
  become: true
  block:
    - name: Disable hybrid sleep
      ansible.builtin.lineinfile:
        path: /etc/systemd/logind.conf
        regexp: ^[#]{0,1}IdleAction
        line: IdleAction=ignore
      notify: Restart systemd-logind
    - name: Mask sleep-related targets
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        masked: true
      loop:
        - sleep.target
        - suspend.target
        - hibernate.target
        - hybrid-sleep.target
      notify: Restart systemd-logind
