---
- name: Deploy gitconfig file
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ ansible_facts.user_dir }}/.gitconfig"
    mode: "0664"

- name: Validate Go repository credentials
  block:
    - name: Get .gitcookies status
      ansible.builtin.stat:
        path: "{{ ansible_facts.user_dir }}/.gitcookies"
      register: git_stat_result
    - name: Create empty .gitcookies
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/.gitcookies"
        state: touch
        mode: "0664"
      when: not git_stat_result.stat.exists
    - name: Stop playbook for credential setup
      ansible.builtin.fail:
        msg: Please setup credentials for Go Git repositories
      when: not git_stat_result.stat.exists or git_stat_result.stat.size == 0
