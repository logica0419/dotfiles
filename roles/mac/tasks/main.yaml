---
- name: Setup default shell
  block:
    - name: Install Homebrew bash
      community.general.homebrew:
        name: bash
        state: present
    - name: Change default shell to Homebrew bash
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: "{{ check_os_brew_base_path }}/bin/bash"

- name: SSH settings
  block:
    - name: Create .ssh directory
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.ssh"
        state: directory
        mode: "0755"
    - name: Move SSH config
      ansible.builtin.copy:
        src: ssh_config
        dest: "{{ ansible_user_dir }}/.ssh/config"
        mode: "0644"

- name: Show hidden files in Finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: true
  notify: Restart Finder

- name: Install cask applications
  community.general.homebrew_cask:
    name:
      # 必須アプリケーション
      - bitwarden
      - logitech-g-hub
      - microsoft-office
      - google-chrome
      - tailscale-app

      # エンジニアリング系
      - visual-studio-code
      - devtoys
      - kicad

      # 音楽系
      - freac
      - musescore
      - rekordbox
      - waves-central

      # 画像・映像系
      - adobe-creative-cloud
      - figma
      - obs
      - xnconvert

      # SNS・通信系
      - discord
      - mattermost
      - signal
      - slack
      - zoom

      # ゲーム系
      - steam
    state: present
