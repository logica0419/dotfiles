---
- name: Configure default shell
  block:
    - name: Install Homebrew bash
      community.general.homebrew:
        name:
          - bash
          - bash-completion@2
        state: present
    - name: Change default shell to Homebrew bash
      become: true
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: "{{ check_os_brew_base_path }}/bin/bash"
    - name: Remove zsh files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ query('ansible.builtin.fileglob', ansible_facts.user_dir + '/.zsh*') }}"

- name: Configure SSH settings
  block:
    - name: Create SSH directories
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - .ssh
        - .ssh/conf.d
    - name: Deploy SSH config file
      ansible.builtin.copy:
        src: ssh_config
        dest: "{{ ansible_facts.user_dir }}/.ssh/config"
        mode: "0600"

- name: Show hidden files in Finder
  community.general.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: true
  notify: Restart Finder

- name: Install Homebrew cask applications
  community.general.homebrew_cask:
    name:
      # 必須アプリケーション
      - bitwarden
      - logitech-g-hub
      - microsoft-office
      - google-chrome
      - tailscale-app

      # エンジニアリング系
      - visual-studio-code
      - devtoys
      - kicad
      - balenaetcher

      # 音楽系
      - freac
      - musescore
      - rekordbox

      # 画像・映像系
      - adobe-creative-cloud
      - figma
      - obs
      - xnconvert

      # SNS・通信系
      - discord
      - mattermost
      - signal
      - slack
      - zoom

      # ゲーム系
      - steam
    state: present

- name: Configure updater service
  block:
    - name: Get current workspace path
      ansible.builtin.command: pwd
      register: mac_dotfiles_dir
      changed_when: false
    - name: Create launch agents directory
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/Library/LaunchAgents"
        state: directory
        mode: "0755"
    - name: Create updater log directory
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/.local/state/dotfiles"
        state: directory
        mode: "0755"
    - name: Deploy updater launchd plist
      ansible.builtin.template:
        src: updater.plist.j2
        dest: "{{ ansible_facts.user_dir }}/Library/LaunchAgents/com.dotfiles-updater.plist"
        mode: "0644"
      register: mac_updater_plist
    - name: Enable updater launch agent
      community.general.launchd:
        name: com.dotfiles-updater
        enabled: true
        state: reloaded
