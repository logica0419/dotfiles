---
- name: Update dotfiles repository
  block:
    - name: Get current workspace path
      ansible.builtin.command: pwd
      register: workspace_dotfiles_dir
      changed_when: false
    - name: Pull dotfiles repository
      ansible.builtin.git: # noqa: latest
        repo: https://github.com/logica0419/dotfiles.git
        dest: "{{ workspace_dotfiles_dir.stdout }}"
      failed_when: false

- name: Clone Git repositories
  ansible.builtin.git: # noqa: latest
    repo: "{{ item.repo }}"
    dest: "{{ ansible_facts.user_dir }}/prj/{{ item.dest }}"
  failed_when: false
  with_items:
    - repo: https://github.com/ictsc/ictsc-regalia.git
      dest: ictsc/ictsc-regalia
    - repo: https://github.com/ictsc/ictsc-drove.git
      dest: ictsc/ictsc-drove

    - repo: https://github.com/nekko-lab/kakko
      dest: nekko-lab/kakko

    - repo: https://github.com/logica0419/zenn-article.git
      dest: personal/zenn-article
    - repo: https://github.com/logica0419/slides.git
      dest: personal/slides
    - repo: https://github.com/logica0419/proposals.git
      dest: personal/proposals
    - repo: https://github.com/logica0419/con-pro.git
      dest: personal/con-pro
    - repo: https://github.com/logica0419/compiler.git
      dest: personal/compiler
    - repo: https://github.com/logica0419/logica0419.dev.git
      dest: personal/logica0419.dev
    - repo: https://github.com/logica0419/coding-kubernetes.git
      dest: personal/coding-kubernetes
    - repo: https://github.com/logica0419/etsecd.git
      dest: personal/etsecd
    - repo: https://github.com/logica0419/playground.git
      dest: personal/playground
    - repo: https://github.com/logica0419/gwc2025-container-runtime
      dest: personal/gwc2025-container-runtime

    - repo: https://github.com/hatahatack/score_plorer_v2.git
      dest: ajy/score_plorer_v2

    - repo: https://go.googlesource.com/go
      dest: oss/go
    - repo: https://go.googlesource.com/vscode-go
      dest: oss/vscode-go
    - repo: https://github.com/logica0419/kubernetes.git
      dest: oss/kubernetes
    - repo: https://github.com/logica0419/website.git
      dest: oss/k8s-website
    - repo: https://github.com/logica0419/etcd
      dest: oss/etcd
    - repo: https://github.com/logica0419/raft
      dest: oss/raft
    - repo: https://github.com/logica0419/youki
      dest: oss/youki
    - repo: https://github.com/logica0419/runc
      dest: oss/runc
    - repo: https://github.com/logica0419/external-secrets
      dest: oss/external-secrets

- name: Configure oxfmt settings
  block:
    - name: Create config directories
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - .config
        - .config/oxfmt
    - name: Deploy oxfmt config file
      ansible.builtin.copy:
        src: .oxfmtrc.json
        dest: "{{ ansible_facts.user_dir }}/.config/oxfmt/.oxfmtrc.json"
        mode: "0600"

- name: Configure clangd settings
  block:
    - name: Create config directories
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - .config
        - .config/clangd
    - name: Deploy clangd config file
      ansible.builtin.copy:
        src: config.yaml
        dest: "{{ ansible_facts.user_dir }}/.config/clangd/config.yaml"
        mode: "0600"

- name: Configure Go repository
  block:
    - name: Get built Go version
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          set -o pipefail
          {{ ansible_facts.user_dir }}/prj/oss/go/bin/go version | cut -d " " -f 3 | cut -c 3-6
      register: workspace_go_built
      changed_when: false
      failed_when: false
    - name: Get required Go version
      ansible.builtin.shell:
        executable: /bin/bash
        cmd: |
          set -o pipefail
          cat {{ ansible_facts.user_dir }}/prj/oss/go/src/go.mod | grep "go 1." | cut -d " " -f 2
      register: workspace_go_required
      changed_when: false
      failed_when: false
    - name: Build Go from source
      ansible.builtin.command:
        cmd: ./make.bash
        chdir: "{{ ansible_facts.user_dir }}/prj/oss/go/src"
      changed_when: false
      when: workspace_go_built.stdout != workspace_go_required.stdout
    - name: Deploy .envrc file
      ansible.builtin.copy:
        src: .envrc
        dest: "{{ ansible_facts.user_dir }}/prj/oss/go/.envrc"
        mode: "0664"
    - name: Run direnv allow
      ansible.builtin.command:
        cmd: "direnv allow"
        chdir: "{{ ansible_facts.user_dir }}/prj/oss/go"
      changed_when: false
    - name: Deploy Git exclude file
      ansible.builtin.copy:
        src: exclude
        dest: "{{ ansible_facts.user_dir }}/prj/oss/go/.git/info/exclude"
        mode: "0664"
    - name: Create VS Code directory
      ansible.builtin.file:
        path: "{{ ansible_facts.user_dir }}/prj/oss/go/.vscode"
        state: directory
        mode: "0755"
    - name: Deploy VS Code settings file
      ansible.builtin.copy:
        src: go-settings.jsonc
        dest: "{{ ansible_facts.user_dir }}/prj/oss/go/.vscode/settings.json"
        mode: "0664"

- name: Configure vscode-go repository
  block:
    - name: Set .vscode skip-worktree # noqa: command-instead-of-module
      ansible.builtin.shell:
        cmd: git update-index --skip-worktree .vscode/*
        chdir: "{{ ansible_facts.user_dir }}/prj/oss/vscode-go"
      changed_when: false
    - name: Deploy VS Code settings file
      ansible.builtin.copy:
        src: vscode-go-settings.jsonc
        dest: "{{ ansible_facts.user_dir }}/prj/oss/vscode-go/.vscode/settings.json"
        mode: "0664"
