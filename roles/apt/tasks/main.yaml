---
- name: Update apt packages
  become: true
  block:
    - name: Audit dpkg configuration
      ansible.builtin.command: dpkg --configure -a
      changed_when: false
    - name: Update apt packages
      ansible.builtin.apt:
        autoclean: true
        autoremove: true
        update_cache: true
        cache_valid_time: 86400
        upgrade: dist
