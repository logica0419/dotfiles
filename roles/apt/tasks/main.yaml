---
- name: Update apt packages
  become: true
  block:
    - name: Audit dpkg configuration
      ansible.builtin.command: dpkg --configure -a
      changed_when: false
    - name: Update apt packages
      ansible.builtin.apt:
        autoclean: true
        autoremove: true
        update_cache: true
        upgrade: dist

- name: Install Homebrew dependencies
  become: true
  ansible.builtin.apt:
    name:
      - build-essential
      - procps
      - curl
      - file
      - git
    state: present
